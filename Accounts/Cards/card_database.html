                    return ok;
                }
            }

            function refreshDerivedDataAfterMetadataChange() {
                const packs = new Map(),
                    rarities = new Set();
                for (const row of state.rows) {
                    row.packLabel = getPackLabel(row.pack);
                    packs.set(row.pack, row.packLabel);
                    const derived = buildRowDerived(row.cardIds);
                    row.cardSearchBlob = derived.cardSearchBlob;
                    row.rarityValues = derived.rarityValues;
                    row.cardTypeValues = derived.cardTypeValues;
                    for (const rarity of row.rarityValues) rarities.add(rarity);
                }
                state.allPacks = new Map(
                    [...packs.entries()].sort((a, b) =>
                        a[1].localeCompare(b[1]),
                    ),
                );
                state.allRarities = computeAllRarityFilters(state.rows);
                if (!state.selectedPacks.size)
                    state.selectedPacks = new Set(state.allPacks.keys());
                if (!state.selectedRarities.size)
                    state.selectedRarities = new Set(state.allRarities);
                if (!state.selectedCardTypes.size)
                    state.selectedCardTypes = new Set(ALL_CARD_TYPES);
                buildFilterCheckboxes();
                applyFiltersAndRender();
            }

            function buildFilterCheckboxes() {
                const packParts = [];
                for (const [packCode, packLabel] of state.allPacks) {
                    const checked = state.selectedPacks.has(packCode);
                    packParts.push(
                        `<label class="check-chip ${checked ? "checked" : ""}"><input type="checkbox" value="${escapeHtml(packCode)}" ${checked ? "checked" : ""}> <span>${escapeHtml(packLabel)}</span></label>`,
                    );
                }
                el.packFilters.innerHTML = packParts.join("");

                const rarityParts = [];
                for (const rarity of state.allRarities) {
                    const checked = state.selectedRarities.has(rarity); // rarity already a string
                    let rarityName = "";
                    if (rarity === SPECIAL_RARITY_TRAINER)
                        rarityName = "★★ Trainer";
                    else
                        rarityName = RARITY_MAP[rarity]
                            ? RARITY_MAP[rarity][0]
                            : `Unknown (${rarity})`;
                    rarityParts.push(
                        `<label class="check-chip ${checked ? "checked" : ""}"><input type="checkbox" value="${rarity}" ${checked ? "checked" : ""}> <span>${escapeHtml(rarityName)}</span></label>`,
                    );
                }
                el.rarityFilters.innerHTML = rarityParts.join("");

                const cardTypeParts = ALL_CARD_TYPES.map((cardType) => {
                    const checked = state.selectedCardTypes.has(cardType);
                    return `<label class="check-chip ${checked ? "checked" : ""}"><input type="checkbox" value="${escapeHtml(cardType)}" ${checked ? "checked" : ""}> <span>${escapeHtml(getCardTypeLabel(cardType))}</span></label>`;
                });
                el.cardTypeFilters.innerHTML = cardTypeParts.join("");
            }

            function readSelectedFilters() {
                state.selectedPacks = new Set(
                    [...el.packFilters.querySelectorAll("input:checked")].map(
                        (input) => input.value,
                    ),
                );
                state.selectedRarities = new Set(
                    [...el.rarityFilters.querySelectorAll("input:checked")].map(
                        (input) => input.value,
                    ),
                );
                state.selectedCardTypes = new Set(
                    [
                        ...el.cardTypeFilters.querySelectorAll("input:checked"),
                    ].map((input) => input.value),
                );
            }

            function getActiveCardFilterConfig(
                cardTerm = normaliseSearch(el.cardSearch.value),
            ) {
                const filterRarities =
                    state.selectedRarities.size !== state.allRarities.size;
                const filterCardTypes =
                    state.selectedCardTypes.size !== ALL_CARD_TYPES.length;
                return {
                    cardTerm,
                    filterRarities,
                    selectedRarities: state.selectedRarities,
                    filterCardTypes,
                    selectedCardTypes: state.selectedCardTypes,
                    active: Boolean(
                        cardTerm || filterRarities || filterCardTypes,
                    ),
                };
            }

            function cardMatchesActiveFilters(cardId, config) {
                const info = getCardInfo(cardId);
                if (
                    config.cardTerm &&
                    !normaliseSearch(`${info.name} ${cardId}`).includes(
                        config.cardTerm,
                    )
                )
                    return false;
                if (
                    config.filterCardTypes &&
                    !config.selectedCardTypes.has(getCardType(cardId))
                )
                    return false;
                if (
                    config.filterRarities &&
                    (() => {
                        const selected = config.selectedRarities;
                        const rarityCode =
                            info.rarityValue == null
                                ? null
                                : String(info.rarityValue);
                        const isTrainer = getCardType(cardId) === "trainer";
                        const matchesBase =
                            !isTrainer &&
                            rarityCode != null &&
                            selected.has(rarityCode);
                        const matchesTrainerDiamond =
                            isTrainer &&
                            rarityCode != null &&
                            rarityCode !== "700" &&
                            selected.has(rarityCode);
                        const matchesTrainer =
                            isTrainer &&
                            rarityCode === "700" &&
                            selected.has(SPECIAL_RARITY_TRAINER);
                        return !(
                            matchesBase ||
                            matchesTrainerDiamond ||
                            matchesTrainer
                        );
                    })()
                )
                    return false;
                return true;
            }

            function filterCardIdsByActiveFilters(
                cardIds,
                config = getActiveCardFilterConfig(),
            ) {
                if (!config.active) return cardIds;
                return cardIds.filter((id) =>
                    cardMatchesActiveFilters(id, config),
                );
            }

            function filterCardEntriesByActiveFilters(
                cardEntries,
                config = getActiveCardFilterConfig(),
            ) {
                if (!config.active) return cardEntries;
                return cardEntries.filter((entry) =>
                    cardMatchesActiveFilters(entry.id, config),
                );
            }

            function applyFiltersAndRender() {
                state.displayLimit = INITIAL_LIMIT;
                state.accountRows = null;
                const accountTerm = normaliseSearch(el.accountSearch.value);
                const cardTerm = normaliseSearch(el.cardSearch.value);
                const filterPacks =
                    state.selectedPacks.size !== state.allPacks.size;
                const cardFilterConfig = getActiveCardFilterConfig(cardTerm);
                const hasNoPacks =
                    state.allPacks.size > 0 && state.selectedPacks.size === 0;
                const hasNoRarities =
                    state.allRarities.size > 0 &&
                    state.selectedRarities.size === 0;

                if (hasNoPacks || hasNoRarities) {
                    state.filteredRows = [];
                    updateStats(0);
                    renderCurrent();
                    return;
                }

                const selectedPacks = state.selectedPacks;
                const filtered = [];
                for (const row of state.rows) {
                    if (accountTerm) {
                        const fileLabel = normaliseSearch(
                            state.accountFileLabelMap.get(row.account) || "",
                        );
                        if (
                            !row.accountLower.includes(accountTerm) &&
                            !fileLabel.includes(accountTerm)
                        )
                            continue;
                    }
                    if (filterPacks && !selectedPacks.has(row.pack)) continue;
                    if (
                        cardFilterConfig.active &&
                        !row.cardIds.some((id) =>
                            cardMatchesActiveFilters(id, cardFilterConfig),
                        )
                    )
                        continue;
                    filtered.push(row);
                }
                sortRows(filtered);
                state.filteredRows = filtered;
                updateStats(filtered.length);
                renderCurrent();
            }

            function updateStats(visibleCount) {
                el.statAccounts.textContent = formatNumber(state.accountCount);
                el.statRows.textContent = formatNumber(state.rowCount);
                el.statCards.textContent = formatNumber(state.totalCards);
                el.statUniqueCards.textContent = formatNumber(
                    state.uniqueCardCount,
                );
            }

            function renderCurrent() {
                if (state.view === "rows") renderRows();
                else if (state.view === "allcards") renderAllCardsView();
                else if (state.view === "traded") renderTradedView();
                else renderAccountOverview();
            }

            function renderTradedView() {
                el.rows.innerHTML = "";
                el.showMoreBtn.classList.add("hidden");
                if (!state.tradedSet.size) {
                    el.resultNote.textContent = "No traded cards marked yet.";
                    el.rows.innerHTML = `<div class="empty panel">Click the 🔁 icon on any card to mark it as traded.</div>`;
                    return;
                }
                const byAccount = new Map();
                for (const key of state.tradedSet) {
                    const sep = key.indexOf("::");
                    if (sep < 0) continue;
                    const acc = key.slice(0, sep);
                    const cid = key.slice(sep + 2);
                    if (!byAccount.has(acc)) byAccount.set(acc, []);
                    byAccount.get(acc).push(cid);
                }
                const total = [...byAccount.values()].reduce(
                    (s, v) => s + v.length,
                    0,
                );
                el.resultNote.textContent = `${formatNumber(total)} traded card(s) across ${formatNumber(byAccount.size)} account(s).`;
                const fragment = document.createDocumentFragment();
                for (const [acc, cardIds] of byAccount) {
                    const rawFileLabel =
                        state.accountFileLabelMap.get(acc) || "";
                    const fileLabelShort = rawFileLabel
                        ? buildFileLabelMeta(rawFileLabel)
                        : "";
                    const titleMain = fileLabelShort
                        ? `<span title="${escapeHtml(rawFileLabel)}">${escapeHtml(fileLabelShort)}</span><button type="button" class="copy-btn" data-copy-file="${escapeHtml(rawFileLabel)}">Copy</button>`
                        : escapeHtml(acc);
                    const article = document.createElement("article");
                    article.className = "db-row panel";
                    article.innerHTML = `<div class="row-head"><div class="row-title"><strong>${titleMain}</strong><div class="meta"><span>Account ${escapeHtml(acc)}</span><span>${formatNumber(cardIds.length)} traded card(s)</span></div></div></div><div class="row-body"></div>`;
                    const body = article.querySelector(".row-body");
                    body.appendChild(
                        renderCardGrid(cardIds, {
                            showQuantity: false,
                            account: acc,
                        }),
                    );
                    const copyBtn = article.querySelector("[data-copy-file]");
                    if (copyBtn)
                        copyBtn.addEventListener("click", async (e) => {
                            e.stopPropagation();
                            await copyToClipboard(
                                copyBtn.getAttribute("data-copy-file") || "",
                            );
                        });
                    fragment.appendChild(article);
                }
                el.rows.appendChild(fragment);
            }

            function getAllKnownCardIds() {
                const ids = new Set();
                if (state.cardmaster && typeof state.cardmaster === "object") {
                    for (const id of Object.keys(state.cardmaster))
                        ids.add(String(id));
                }
                for (const row of state.rows) {
                    for (const id of row.cardIds) ids.add(String(id));
                }
                return [...ids];
            }

            function buildCardAccountCounts() {
                const cardToAccounts = new Map();
                const accountFirstSeenMs = new Map();
                for (const row of state.rows) {
                    if (Number.isFinite(row.timestampMs)) {
                        const prev = accountFirstSeenMs.get(row.account);
                        if (!Number.isFinite(prev) || row.timestampMs < prev)
                            accountFirstSeenMs.set(
                                row.account,
                                row.timestampMs,
                            );
                    }
                    for (const cardId of row.cardIds) {
                        if (!cardToAccounts.has(cardId))
                            cardToAccounts.set(cardId, new Map());
                        const accountMap = cardToAccounts.get(cardId);
                        accountMap.set(
                            row.account,
                            (accountMap.get(row.account) || 0) + 1,
                        );
                    }
                }
                return { cardToAccounts, accountFirstSeenMs };
            }

            function sortCatalogAccounts(rows) {
                const mode = state.catalogAccountSort;
                const asc = state.catalogAccountSortAsc;
                const dir = asc ? 1 : -1;
                rows.sort((a, b) => {
                    if (mode === "shinedust") {
                        const aDust = Number.isFinite(a.shinedust)
                            ? a.shinedust
                            : Number.NEGATIVE_INFINITY;
                        const bDust = Number.isFinite(b.shinedust)
                            ? b.shinedust
                            : Number.NEGATIVE_INFINITY;
                        if (aDust !== bDust) return (aDust - bDust) * dir;
                    } else if (mode === "age") {
                        const aAge = Number.isFinite(a.ageDays)
                            ? a.ageDays
                            : Number.POSITIVE_INFINITY;
                        const bAge = Number.isFinite(b.ageDays)
                            ? b.ageDays
                            : Number.POSITIVE_INFINITY;
                        if (aAge !== bAge) return (aAge - bAge) * dir;
                    } else {
                        if (a.count !== b.count)
                            return (a.count - b.count) * dir;
                    }
                    return a.account.localeCompare(b.account);
                });
                return rows;
            }

            function renderAllCardsView() {
                const activeElement = document.activeElement;
                const preserveCatalogSearchFocus =
                    activeElement && activeElement.id === "catalogCardSearch";
                const catalogSearchSelectionStart = preserveCatalogSearchFocus
                    ? activeElement.selectionStart
                    : null;
                const catalogSearchSelectionEnd = preserveCatalogSearchFocus
                    ? activeElement.selectionEnd
                    : null;

                el.rows.innerHTML = "";
                el.showMoreBtn.classList.add("hidden");

                if (
                    !state.cardmaster ||
                    !state.localisation ||
                    !state.cardmap
                ) {
                    el.resultNote.textContent = "Card metadata not loaded.";
                    el.rows.innerHTML = `<div class="empty panel">Load card data to show the full game catalog.</div>`;
                    return;
                }

                const searchTerm = normaliseSearch(state.catalogCardSearch);
                const allIds = getAllKnownCardIds();
                const { cardToAccounts, accountFirstSeenMs } =
                    buildCardAccountCounts();

                const sections = new Map();
                const byCardId = new Map();
                let availableCards = 0;
                let availableCopies = 0;

                for (const cardId of allIds) {
                    const info = getCardInfo(cardId);
                    if (
                        searchTerm &&
                        !normaliseSearch(`${info.name} ${cardId}`).includes(
                            searchTerm,
                        )
                    )
                        continue;

                    const sectionCode =
                        getCardExpansionId(cardId) || "__unknown__";
                    const sectionLabel =
                        sectionCode === "__unknown__"
                            ? "Unknown section"
                            : getPackLabel(sectionCode);

                    const accountCounts =
                        cardToAccounts.get(cardId) || new Map();
                    const accountRows = [];
                    let totalCopies = 0;
                    for (const [account, count] of accountCounts) {
                        if (isTraded(account, cardId)) continue;
                        totalCopies += count;
                        accountRows.push({
                            account,
                            count,
                            shinedust: state.accountShinedustMap.has(account)
                                ? state.accountShinedustMap.get(account)
                                : Number.NaN,
                            ageDays: calculateAccountAgeDays(
                                account,
                                accountFirstSeenMs.get(account),
                            ),
                        });
                    }

                    sortCatalogAccounts(accountRows);
                    if (totalCopies > 0) {
                        availableCards++;
                        availableCopies += totalCopies;
                    }

                    const item = {
                        id: cardId,
                        info,
                        sectionCode,
                        sectionLabel,
                        expansionNo: getCardExpansionNumber(cardId, info),
                        totalCopies,
                        accountRows,
                    };
                    byCardId.set(cardId, item);
                    if (!sections.has(sectionCode))
                        sections.set(sectionCode, {
                            code: sectionCode,
                            label: sectionLabel,
                            cards: [],
                        });
                    sections.get(sectionCode).cards.push(item);
                }

                const sectionListAll = [...sections.values()].sort((a, b) =>
                    a.code.localeCompare(b.code),
                );
                for (const section of sectionListAll)
                    section.cards.sort((a, b) => {
                        const an = Number.isFinite(a.expansionNo)
                            ? a.expansionNo
                            : Number.POSITIVE_INFINITY;
                        const bn = Number.isFinite(b.expansionNo)
                            ? b.expansionNo
                            : Number.POSITIVE_INFINITY;
                        if (an !== bn) return an - bn;
                        return a.id.localeCompare(b.id);
                    });

                const catalogRarityKeys = new Set();
                for (const section of sectionListAll) {
                    for (const card of section.cards) {
                        const rarityKey = getCardRarityFilterKey(
                            card.id,
                            card.info,
                        );
                        if (rarityKey) catalogRarityKeys.add(rarityKey);
                    }
                }

                if (!state.catalogRaritiesInitialized) {
                    state.catalogSelectedRarities = new Set(catalogRarityKeys);
                    state.catalogRaritiesInitialized = true;
                }

                const rarityFilteredSections = sectionListAll
                    .map((section) => {
                        const cards = section.cards
                            .filter((card) =>
                                state.catalogSelectedRarities.has(
                                    getCardRarityFilterKey(card.id, card.info),
                                ),
                            )
                            .sort((a, b) => {
                                const an = Number.isFinite(a.expansionNo)
                                    ? a.expansionNo
                                    : Number.POSITIVE_INFINITY;
                                const bn = Number.isFinite(b.expansionNo)
                                    ? b.expansionNo
                                    : Number.POSITIVE_INFINITY;
                                if (an !== bn) return an - bn;
                                return (
                                    a.info.name.localeCompare(b.info.name) ||
                                    a.id.localeCompare(b.id)
                                );
                            });
                        return { ...section, cards };
                    })
                    .filter((section) => section.cards.length > 0);

                // Auto-select first available expansion instead of showing all
                if (
                    state.catalogExpansionFilter === "__all__" &&
                    sectionListAll.length > 0
                ) {
                    state.catalogExpansionFilter = sectionListAll[0].code;
                }

                const filteredSections = rarityFilteredSections.filter(
                    (section) => section.code === state.catalogExpansionFilter,
                );

                const hasVisibleCards = filteredSections.length > 0;

                if (
                    hasVisibleCards &&
                    !byCardId.has(state.selectedCatalogCardId)
                )
                    state.selectedCatalogCardId =
                        filteredSections[0].cards[0].id;

                const selectedInFiltered = hasVisibleCards
                    ? filteredSections
                          .flatMap((section) => section.cards)
                          .some(
                              (card) => card.id === state.selectedCatalogCardId,
                          )
                    : false;
                if (hasVisibleCards && !selectedInFiltered)
                    state.selectedCatalogCardId =
                        filteredSections[0].cards[0].id;

                const selected = hasVisibleCards
                    ? byCardId.get(state.selectedCatalogCardId)
                    : null;

                const rarityControls = [...catalogRarityKeys]
                    .sort((a, b) => {
                        const av =
                            a === SPECIAL_RARITY_TRAINER ? 650 : Number(a);
                        const bv =
                            b === SPECIAL_RARITY_TRAINER ? 650 : Number(b);
                        return av - bv;
                    })
                    .map((rarityKey) => {
                        const checked =
                            state.catalogSelectedRarities.has(rarityKey);
                        return `<label class="check-chip ${checked ? "checked" : ""}"><input type="checkbox" value="${escapeHtml(rarityKey)}" ${checked ? "checked" : ""}> <span>${escapeHtml(getRarityFilterLabel(rarityKey))}</span></label>`;
                    })
                    .join("");

                const expansionOptions = sectionListAll
                    .map(
                        (section) =>
                            `<option value="${escapeHtml(section.code)}" ${
                                state.catalogExpansionFilter === section.code
                                    ? "selected"
                                    : ""
                            }>${escapeHtml(section.label)}</option>`,
                    )
                    .join("");

                const controlsHtml = `<div class="catalog-controls"><div class="catalog-field-stack panel" style="padding:14px"><div><label class="field-label" for="catalogExpansionFilter">Expansion</label><select id="catalogExpansionFilter">${expansionOptions}</select></div><div><label class="field-label" for="catalogCardSearch">Search card</label><input id="catalogCardSearch" type="search" placeholder="Card name or card id..." value="${escapeHtml(state.catalogCardSearch)}"></div></div><div class="panel" style="padding:14px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px"><label class="field-label" style="margin:0" for="catalogRarityFilters">Rarity</label><div class="small-actions"><button type="button" style="padding-top:2px;padding-bottom:2px" data-catalog-rarity-action="all">All</button><button type="button" style="padding-top:2px;padding-bottom:2px" data-catalog-rarity-action="none">Clear</button></div></div><div class="checkbox-list" id="catalogRarityFilters">${rarityControls}</div></div></div>`;

                const sectionsHtml = hasVisibleCards
                    ? filteredSections
                          .map((section) => {
                              const cardsHtml = section.cards
                                  .map((card) => {
                                      const unavailable =
                                          card.totalCopies === 0;
                                      const selectedClass =
                                          card.id ===
                                          state.selectedCatalogCardId
                                              ? " selected"
                                              : "";
                                      const unavailableClass = unavailable
                                          ? " unavailable"
                                          : "";
                                      const imgPart = card.info.imageUrl
                                          ? `<img src="${escapeHtml(card.info.imageUrl)}" loading="lazy" alt="${escapeHtml(card.info.name)}" onerror="this.style.display='none';this.nextElementSibling.classList.remove('hidden');">`
                                          : "";
                                      const fallbackClass = card.info.imageUrl
                                          ? "hidden empty"
                                          : "empty";
                                      return `<button type="button" class="catalog-card-btn" data-catalog-card-id="${escapeHtml(card.id)}"><div class="card-tile${selectedClass}${unavailableClass}"><div class="qty">×${formatNumber(card.totalCopies)}</div>${imgPart}<div class="${fallbackClass}" style="padding:22px 8px">No image</div><div class="card-name">${escapeHtml(card.info.name)}</div><div class="card-badges"><span class="mini-badge">${escapeHtml(card.info.rarityName)}</span></div></div></button>`;
                                  })
                                  .join("");
                              const availableInSection = section.cards.filter(
                                  (card) => card.totalCopies > 0,
                              ).length;
                              return `<article class="catalog-section panel"><div class="catalog-section-head"><div class="catalog-section-title">${escapeHtml(section.label)}</div><div class="catalog-section-meta">${formatNumber(availableInSection)}/${formatNumber(section.cards.length)} available</div></div><div class="cards-grid">${cardsHtml}</div></article>`;
                          })
                          .join("")
                    : `<div class="empty panel">No cards match the selected rarity filters.</div>`;

                const accountRows = selected ? [...selected.accountRows] : [];
                sortCatalogAccounts(accountRows);

                if (
                    selected &&
                    accountRows.length &&
                    !accountRows.some(
                        (row) => row.account === state.selectedCatalogAccount,
                    )
                ) {
                    state.selectedCatalogAccount = accountRows[0].account;
                }
                if (!selected || !accountRows.length)
                    state.selectedCatalogAccount = "";

                const accountItemsHtml = selected
                    ? accountRows.length
                        ? accountRows
                              .map((row) => {
                                  const noTrade =
                                      selected.info.rarityValue === 800 ||
                                      selected.info.rarityValue === 900;
                                  const preferredRaw =
                                      state.accountFileLabelMap.get(
                                          row.account,
                                      ) || row.account;
                                  const preferredShort =
                                      buildFileLabelMeta(preferredRaw);
                                  const accountNameLabel =
                                      preferredRaw !== row.account
                                          ? `<span title="${escapeHtml(preferredRaw)}">${escapeHtml(preferredShort || preferredRaw)}</span>`
                                          : escapeHtml(row.account);
                                  const accountOriginMeta =
                                      preferredRaw !== row.account
                                          ? `<span>Device ${escapeHtml(row.account)}</span>`
                                          : "";
                                  const shinedustLabel = Number.isFinite(
                                      row.shinedust,
                                  )
                                      ? `Shinedust ${formatNumber(row.shinedust)}`
                                      : "Shinedust n/a";
                                  const ageLabel = Number.isFinite(row.ageDays)
                                      ? `Age ${formatNumber(row.ageDays)}d`
                                      : "Age n/a";
                                  const tradeBtn = noTrade
                                      ? ""
                                      : `<button type="button" data-mark-traded-account="${escapeHtml(row.account)}" data-mark-traded-card="${escapeHtml(selected.id)}">Mark traded</button>`;
                                  const isSelected =
                                      row.account ===
                                      state.selectedCatalogAccount;
                                  return `<div class="catalog-account-item${isSelected ? " selected" : ""}" data-select-catalog-account="${escapeHtml(row.account)}" role="button" tabindex="0" aria-pressed="${isSelected ? "true" : "false"}"><div class="catalog-account-name${isSelected ? " selected" : ""}">${accountNameLabel}</div><div class="catalog-account-meta">${accountOriginMeta}<span>Copies ${formatNumber(row.count)}</span><span>${escapeHtml(shinedustLabel)}</span><span>${escapeHtml(ageLabel)}</span></div><div class="catalog-account-actions"><button type="button" data-copy-account="${escapeHtml(preferredRaw)}">Copy account</button>${tradeBtn}</div></div>`;
                              })
                              .join("")
                        : `<div class="empty panel" style="padding:14px">No available account currently has this card.</div>`
                    : `<div class="empty panel" style="padding:14px">Select a card to view account availability.</div>`;

                const selectedMeta = selected
                    ? `<div class="catalog-side-meta"><span>${escapeHtml(selected.info.name)}</span><span>${formatNumber(selected.totalCopies)} available copy(s)</span><span>${formatNumber(accountRows.length)} account(s)</span></div>`
                    : "";

                const sideHtml = `<aside class="catalog-side panel"><div class="catalog-side-title">Card availability</div>${selectedMeta}<div class="catalog-account-sort"><label class="field-label" for="catalogAccountSort">Sort accounts</label><div style="display:flex;gap:6px;align-items:center"><select id="catalogAccountSort" style="flex:1"><option value="copies" ${state.catalogAccountSort === "copies" ? "selected" : ""}>Copies</option><option value="shinedust" ${state.catalogAccountSort === "shinedust" ? "selected" : ""}>Shinedust</option><option value="age" ${state.catalogAccountSort === "age" ? "selected" : ""}>Age</option></select><button id="catalogAccountSortDir" type="button" class="icon-btn" title="Toggle sort direction" style="min-width:34px;padding:0 8px;font-size:1rem;display:inline-flex;align-items:center;justify-content:center">${state.catalogAccountSortAsc ? "↑" : "↓"}</button></div></div><div class="catalog-account-list">${accountItemsHtml}</div><div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border)"><button type="button" id="goToTradedBtn" style="width:100%;text-align:left;color:var(--muted);font-size:0.82rem;background:none;border:none;cursor:pointer;padding:4px 0">Traded cards →</button></div></aside>`;

                el.rows.innerHTML = `<div class="catalog-layout"><section class="catalog-sections">${controlsHtml}${sectionsHtml}</section>${sideHtml}</div>`;
                el.resultNote.textContent = hasVisibleCards
                    ? `${formatNumber(availableCards)} of ${formatNumber(byCardId.size)} cards available · ${formatNumber(availableCopies)} total available copy(s).`
                    : "No cards match the selected rarity filters.";

                el.rows
                    .querySelectorAll("[data-catalog-card-id]")
                    .forEach((btn) => {
                        btn.addEventListener("click", () => {
                            state.selectedCatalogCardId =
                                btn.getAttribute("data-catalog-card-id") || "";
                            state.selectedCatalogAccount = "";
                            renderAllCardsView();
                        });
                    });

                el.rows
                    .querySelectorAll("[data-select-catalog-account]")
                    .forEach((btn) => {
                        const selectAccount = () => {
                            const account =
                                btn.getAttribute(
                                    "data-select-catalog-account",
                                ) || "";
                            if (state.selectedCatalogAccount === account)
                                return;
                            state.selectedCatalogAccount = account;
                            // Fast path: just update CSS classes without full re-render
                            el.rows
                                .querySelectorAll(
                                    "[data-select-catalog-account]",
                                )
                                .forEach((item) => {
                                    const isSelected =
                                        item.getAttribute(
                                            "data-select-catalog-account",
                                        ) === account;
                                    item.classList.toggle(
                                        "selected",
                                        isSelected,
                                    );
                                    item.setAttribute(
                                        "aria-pressed",
                                        isSelected ? "true" : "false",
                                    );
                                    const nameEl = item.querySelector(
                                        ".catalog-account-name",
                                    );
                                    if (nameEl)
                                        nameEl.classList.toggle(
                                            "selected",
                                            isSelected,
                                        );
                                });
                        };
                        btn.addEventListener("click", (event) => {
                            if (
                                event.target.closest(".catalog-account-actions")
                            )
                                return;
                            selectAccount();
                        });
                        btn.addEventListener("keydown", (event) => {
                            if (
                                event.key !== "Enter" &&
                                event.key !== " " &&
                                event.key !== "Spacebar"
                            )
                                return;
                            event.preventDefault();
                            selectAccount();
                        });
                    });

                const sortSelect =
                    document.getElementById("catalogAccountSort");
                if (sortSelect)
                    sortSelect.addEventListener("change", () => {
                        state.catalogAccountSort = sortSelect.value;
                        renderAllCardsView();
                    });

                const sortDirBtn = document.getElementById(
                    "catalogAccountSortDir",
                );
                if (sortDirBtn)
                    sortDirBtn.addEventListener("click", () => {
                        state.catalogAccountSortAsc =
                            !state.catalogAccountSortAsc;
                        renderAllCardsView();
                    });

                const goToTradedBtn = document.getElementById("goToTradedBtn");
                if (goToTradedBtn)
                    goToTradedBtn.addEventListener("click", () =>
                        setView("traded"),
                    );

                const expansionSelect = document.getElementById(
                    "catalogExpansionFilter",
                );
                if (expansionSelect)
                    expansionSelect.addEventListener("change", () => {
                        state.catalogExpansionFilter = expansionSelect.value;
                        renderAllCardsView();
                    });

                const searchInput =
                    document.getElementById("catalogCardSearch");
                if (searchInput)
                    searchInput.addEventListener("input", () => {
                        state.catalogCardSearch = searchInput.value;
                        renderAllCardsView();
                    });

                if (preserveCatalogSearchFocus && searchInput) {
                    requestAnimationFrame(() => {
                        searchInput.focus();
                        if (
                            Number.isInteger(catalogSearchSelectionStart) &&
                            Number.isInteger(catalogSearchSelectionEnd)
                        ) {
                            searchInput.setSelectionRange(
                                catalogSearchSelectionStart,
                                catalogSearchSelectionEnd,
                            );
                        }
                    });
                }

                const rarityBox = document.getElementById(
                    "catalogRarityFilters",
                );
                if (rarityBox)
                    rarityBox.addEventListener("change", () => {
                        state.catalogSelectedRarities = new Set(
                            [
                                ...rarityBox.querySelectorAll("input:checked"),
                            ].map((input) => input.value),
                        );
                        renderAllCardsView();
                    });

                el.rows
                    .querySelectorAll("[data-catalog-rarity-action]")
                    .forEach((btn) => {
                        btn.addEventListener("click", () => {
                            if (btn.dataset.catalogRarityAction === "all")
                                state.catalogSelectedRarities = new Set(
                                    catalogRarityKeys,
                                );
                            else state.catalogSelectedRarities = new Set();
                            renderAllCardsView();
                        });
                    });

                el.rows
                    .querySelectorAll("[data-copy-account]")
                    .forEach((btn) => {
                        btn.addEventListener("click", async () => {
                            const account =
                                btn.getAttribute("data-copy-account") || "";
                            if (!account) return;
                            const ok = await copyToClipboard(account);
                            const old = btn.textContent;
                            btn.textContent = ok ? "Copied" : "Retry";
                            setTimeout(() => {
                                btn.textContent = old;
                            }, 900);
                        });
                    });

                el.rows
                    .querySelectorAll(
                        "[data-mark-traded-account][data-mark-traded-card]",
                    )
                    .forEach((btn) => {
                        btn.addEventListener("click", () => {
                            const account =
                                btn.getAttribute("data-mark-traded-account") ||
                                "";
                            const cardId =
                                btn.getAttribute("data-mark-traded-card") || "";
                            if (!account || !cardId) return;
                            const cardName = getCardInfo(cardId).name || cardId;
                            const preferredAccountName =
                                state.accountFileLabelMap.get(account) ||
                                account;
                            showConfirm(
                                `Mark "${cardName}" as traded for ${preferredAccountName}?`,
                            ).then((confirmed) => {
                                if (!confirmed) return;
                                toggleTraded(account, cardId);
                                renderAllCardsView();
                            });
                        });
                    });
            }

            function rowIsExpanded(row) {
                return (
                    state.expandedRows.has(row.index) ||
                    (state.defaultExpanded &&
                        !state.expandedRows.has(`compact:${row.index}`))
                );
            }
            function accountIsExpanded(accountKey) {
                return (
                    state.expandedAccounts.has(accountKey) ||
                    (state.defaultExpanded &&
                        !state.expandedAccounts.has(`compact:${accountKey}`))
                );
            }
            function setRowExpanded(rowIndex, expanded) {
                if (expanded) {
                    state.expandedRows.add(rowIndex);
                    state.expandedRows.delete(`compact:${rowIndex}`);
                } else {
                    state.expandedRows.delete(rowIndex);
                    state.expandedRows.add(`compact:${rowIndex}`);
                }
            }
            function setAccountExpanded(accountKey, expanded) {
                if (expanded) {
                    state.expandedAccounts.add(accountKey);
                    state.expandedAccounts.delete(`compact:${accountKey}`);
                } else {
                    state.expandedAccounts.delete(accountKey);
                    state.expandedAccounts.add(`compact:${accountKey}`);
                }
            }

            function renderRows() {
                el.rows.innerHTML = "";
                el.showMoreBtn.classList.add("hidden");
                if (!state.csvLoaded) {
                    el.resultNote.textContent = "No CSV loaded.";
                    el.rows.innerHTML = `<div class="empty panel">Upload a CSV file to show card rows.</div>`;
                    return;
                }
                const total = state.filteredRows.length;
                const shown = Math.min(state.displayLimit, total);
                el.resultNote.textContent = `Showing ${formatNumber(shown)} of ${formatNumber(total)} matching row(s).`;
                if (!total) {
                    el.rows.innerHTML = `<div class="empty panel">No rows match the current filters.</div>`;
                    return;
                }
                const fragment = document.createDocumentFragment();
                for (let i = 0; i < shown; i++)
                    fragment.appendChild(
                        createRowElement(state.filteredRows[i]),
                    );
                el.rows.appendChild(fragment);
                updateShowMore(total, shown);
            }

            function createRowElement(row) {
                const expanded = rowIsExpanded(row);
                const article = document.createElement("article");
                article.className = "db-row panel";
                // In database-row view, filters decide whether the row is shown,
                // but the expanded row still shows the full pack.
                const visibleCardIds = row.cardIds;
                const visibleInfos = visibleCardIds.map((id) =>
                    getCardInfo(id),
                );
                const rarityNames = [
                    ...new Set(visibleInfos.map((info) => info.rarityName)),
                ]
                    .slice(0, 5)
                    .join(", ");
                const countMeta =
                    visibleCardIds.length !== row.cardCount
                        ? `${formatNumber(visibleCardIds.length)} card(s) shown · ${formatNumber(row.cardCount)} total`
                        : `${formatNumber(row.cardCount)} card(s)`;
                const tsMeta = row.timestamp
                    ? `<span>${escapeHtml(row.timestamp)}</span>`
                    : "";
                const rrMeta = rarityNames
                    ? `<span>${escapeHtml(rarityNames)}</span>`
                    : "";
                article.innerHTML = `<div class="row-head"><div class="row-title"><strong>${escapeHtml(row.account)} · ${escapeHtml(row.packLabel)}</strong><div class="meta"><span>${countMeta}</span>${tsMeta}${rrMeta}</div></div><div class="row-actions"><button class="toggle-btn" type="button">${expanded ? "Compact" : "Expand"}</button></div></div><div class="row-body"${expanded ? "" : " hidden"}></div>`;
                const rowHead = article.firstElementChild;
                const body = article.lastElementChild;
                const btn = rowHead.lastElementChild.firstElementChild;
                if (expanded)
                    body.appendChild(
                        renderCardGrid(visibleCardIds, {
                            showQuantity: false,
                            account: row.account,
                        }),
                    );
                btn.addEventListener("click", () => {
                    setRowExpanded(row.index, !rowIsExpanded(row));
                    renderCurrent();
                });
                return article;
            }

            function buildAccountOverview() {
                if (state.accountRows) return state.accountRows;
                const accountMap = new Map();
                for (const row of state.filteredRows) {
                    let account = accountMap.get(row.account);
                    if (!account) {
                        account = {
                            key: row.account,
                            account: row.account,
                            rows: 0,
                            totalCards: 0,
                            packs: new Map(),
                            cards: new Map(),
                            firstSeenMs: Number.NaN,
                            lastSeenMs: Number.NaN,
                        };
                        accountMap.set(row.account, account);
                    }
                    account.rows++;
                    account.packs.set(row.pack, row.packLabel);
                    account.totalCards += row.cardCount;
                    if (Number.isFinite(row.timestampMs)) {
                        if (
                            !Number.isFinite(account.firstSeenMs) ||
                            row.timestampMs < account.firstSeenMs
                        )
                            account.firstSeenMs = row.timestampMs;
                        if (
                            !Number.isFinite(account.lastSeenMs) ||
                            row.timestampMs > account.lastSeenMs
                        )
                            account.lastSeenMs = row.timestampMs;
                    }
                    for (const id of row.cardIds)
                        account.cards.set(id, (account.cards.get(id) || 0) + 1);
                }
                state.accountRows = [...accountMap.values()]
                    .map((account) => {
                        const cardEntries = [...account.cards.entries()].map(
                            ([id, count]) => ({
                                id,
                                count,
                                info: getCardInfo(id),
                            }),
                        );
                        cardEntries.sort(
                            (a, b) =>
                                a.info.name.localeCompare(b.info.name) ||
                                a.id.localeCompare(b.id),
                        );
                        return {
                            ...account,
                            uniqueCards: account.cards.size,
                            ageDays: calculateAccountAgeDays(
                                account.account,
                                account.firstSeenMs,
                            ),
                            cardEntries,
                        };
                    })
                    .sort((a, b) => {
                        const asc = state.accountSortAsc;
                        const dir = asc ? 1 : -1;
                        if (state.accountSort === "account") {
                            return dir * a.account.localeCompare(b.account);
                        }
                        if (state.accountSort === "shinedust") {
                            const fallback = asc
                                ? Number.POSITIVE_INFINITY
                                : -1;
                            const aDust = state.accountShinedustMap.has(
                                a.account,
                            )
                                ? state.accountShinedustMap.get(a.account)
                                : fallback;
                            const bDust = state.accountShinedustMap.has(
                                b.account,
                            )
                                ? state.accountShinedustMap.get(b.account)
                                : fallback;
                            if (aDust !== bDust) return dir * (aDust - bDust);
                            return a.account.localeCompare(b.account);
                        }
                        if (state.accountSort === "age") {
                            const fallback = asc
                                ? Number.POSITIVE_INFINITY
                                : -1;
                            const aAge =
                                a.ageDays == null ? fallback : a.ageDays;
                            const bAge =
                                b.ageDays == null ? fallback : b.ageDays;
                            if (aAge !== bAge) return dir * (aAge - bAge);
                            return a.account.localeCompare(b.account);
                        }
                        return a.account.localeCompare(b.account);
                    });
                return state.accountRows;
            }

            // Account rows are already filtered at the row level; this narrows the expanded card list
            // to the active card search, rarity, and trainer/non-trainer selections.
            function getVisibleAccountCardEntries(cardEntries) {
                return filterCardEntriesByActiveFilters(cardEntries);
            }

            function renderAccountOverview() {
                el.rows.innerHTML = "";
                el.showMoreBtn.classList.add("hidden");
                if (!state.csvLoaded) {
                    el.resultNote.textContent = "No CSV loaded.";
                    el.rows.innerHTML = `<div class="empty panel">Upload a CSV file to show account overviews.</div>`;
                    return;
                }
                const accounts = buildAccountOverview();
                const total = accounts.length;
                const shown = Math.min(state.displayLimit, total);
                el.resultNote.textContent = `Showing ${formatNumber(shown)} of ${formatNumber(total)} matching account(s).`;
                if (!total) {
                    el.rows.innerHTML = `<div class="empty panel">No accounts match the current filters.</div>`;
                    return;
                }
                const fragment = document.createDocumentFragment();
                for (let i = 0; i < shown; i++)
                    fragment.appendChild(createAccountElement(accounts[i]));
                el.rows.appendChild(fragment);
                applyHideTradedClass();
                updateShowMore(total, shown);
            }

            function createAccountElement(account) {
                const expanded = accountIsExpanded(account.key);
                const article = document.createElement("article");
                article.className = "db-row panel";
                const packPreview = [...account.packs.values()]
                    .slice(0, 6)
                    .join(", ");
                const ppMeta = packPreview
                    ? `<span>${escapeHtml(packPreview)}${account.packs.size > 6 ? ", ..." : ""}</span>`
                    : "";
                // Active card filters narrow displayed cards — compute filtered entries for the badge counts.
                const visibleEntries = getVisibleAccountCardEntries(
                    account.cardEntries,
                );
                const visibleCount = visibleEntries.reduce(
                    (s, e) => s + e.count,
                    0,
                );
                const visibleUnique = visibleEntries.length;
                const cardFiltersActive =
                    visibleEntries.length !== account.cardEntries.length;
                const countLabel = cardFiltersActive
                    ? `${formatNumber(visibleCount)} card(s) shown · ${formatNumber(account.totalCards)} total`
                    : `${formatNumber(account.totalCards)} total card(s)`;
                const uniqueLabel = cardFiltersActive
                    ? `${formatNumber(visibleUnique)} unique shown · ${formatNumber(account.uniqueCards)} total`
                    : `${formatNumber(account.uniqueCards)} unique card id(s)`;
                const latestShinedust = state.accountShinedustMap.has(
                    account.account,
                )
                    ? state.accountShinedustMap.get(account.account)
                    : null;
                const shinedustLabel =
                    latestShinedust == null
                        ? "Shinedust n/a"
                        : `Shinedust ${formatNumber(latestShinedust)}`;
                const ageDays = account.ageDays;
                const ageLabel =
                    ageDays == null
                        ? "Age n/a"
                        : `Age ${formatNumber(ageDays)} day(s)`;
                const rawFileLabel =
                    state.accountFileLabelMap.get(account.account) || "";
                const fileLabelShort = buildFileLabelMeta(rawFileLabel);
                const titleMain = fileLabelShort
                    ? `<span title="${escapeHtml(rawFileLabel)}">${escapeHtml(fileLabelShort)}</span><button type="button" class="copy-btn" data-copy-file="${escapeHtml(rawFileLabel)}">Copy</button>`
                    : escapeHtml(account.account);
                const accountMeta = `<span>Account ${escapeHtml(account.account)}</span>`;
                article.innerHTML = `<div class="row-head"><div class="row-title"><strong>${titleMain}</strong><div class="meta">${accountMeta}<span>${countLabel}</span><span>${uniqueLabel}</span><span>${formatNumber(account.rows)} pack(s)</span><span>${escapeHtml(ageLabel)}</span><span>${escapeHtml(shinedustLabel)}</span></div></div><div class="row-actions"><button class="toggle-btn" type="button">${expanded ? "Compact" : "Expand"}</button></div></div><div class="row-body"${expanded ? "" : " hidden"}></div>`;
                const rowHead = article.firstElementChild;
                const body = article.lastElementChild;
                const btn = rowHead.lastElementChild.firstElementChild;
                const copyBtn = rowHead.querySelector("[data-copy-file]");
                if (expanded)
                    body.appendChild(
                        renderCardGrid(visibleEntries, {
                            showQuantity: true,
                            entries: true,
                            account: account.account,
                        }),
                    );
                if (copyBtn)
                    copyBtn.addEventListener("click", async (event) => {
                        event.stopPropagation();
                        const rawName =
                            copyBtn.getAttribute("data-copy-file") || "";
                        const defaultLabel = "Copy";
                        copyBtn.disabled = true;
                        const copied = await copyToClipboard(rawName);
                        appendStatus(
                            copied
                                ? `Copied filename for ${account.account}: ${rawName}`
                                : `Could not copy filename for ${account.account}.`,
                        );
                        if (copied) {
                            copyBtn.classList.add("copied");
                            copyBtn.textContent = "Copied";
                            setTimeout(() => {
                                copyBtn.classList.remove("copied");
                                copyBtn.textContent = defaultLabel;
                                copyBtn.disabled = false;
                            }, 1000);
                        } else {
                            copyBtn.textContent = "Retry";
                            setTimeout(() => {
                                copyBtn.textContent = defaultLabel;
                                copyBtn.disabled = false;
                            }, 1200);
                        }
                    });
                btn.addEventListener("click", () => {
                    setAccountExpanded(
                        account.key,
                        !accountIsExpanded(account.key),
                    );
                    renderCurrent();
                });
                return article;
            }

            function renderCardGrid(items, options) {
                const parts = [];
                const account = options.account || "";
                for (const item of items) {
                    const id = options.entries ? item.id : item;
                    const count = options.entries ? item.count : 0;
                    const card = options.entries ? item.info : getCardInfo(id);
                    const imgPart = card.imageUrl
                        ? `<img src="${escapeHtml(card.imageUrl)}" loading="lazy" alt="${escapeHtml(card.name)}" onerror="this.style.display='none';this.nextElementSibling.classList.remove('hidden');">`
                        : "";
                    const fallbackClass = card.imageUrl
                        ? "hidden empty"
                        : "empty";
                    const qtyPart = options.showQuantity
                        ? `<div class="qty">×${formatNumber(count)}</div>`
                        : "";
                    const noTrade =
                        card.rarityValue === 800 || card.rarityValue === 900;
                    const tradedClass =
                        account && isTraded(account, id) ? " traded" : "";
                    const tradedBtn =
                        account && !noTrade
                            ? `<button class="traded-btn" type="button" data-account="${escapeHtml(account)}" data-card-id="${escapeHtml(id)}" title="Mark as traded">🔁</button>`
                            : "";
                    parts.push(
                        `<div class="card-tile${tradedClass}">${qtyPart}${tradedBtn}${imgPart}<div class="${fallbackClass}" style="padding:22px 8px">No image</div><div class="card-name">${escapeHtml(card.name)}</div><div class="card-badges"><span class="mini-badge">${escapeHtml(card.rarityName)}</span></div></div>`,
                    );
                }
                const grid = document.createElement("div");
                grid.className = "cards-grid";
                grid.innerHTML = parts.join("");
                if (account) {
                    grid.addEventListener("click", (e) => {
                        const btn = e.target.closest(".traded-btn");
                        if (!btn) return;
                        const acc = btn.dataset.account;
                        const cid = btn.dataset.cardId;
                        const tile = btn.closest(".card-tile");
                        const alreadyTraded = isTraded(acc, cid);
                        if (alreadyTraded) {
                            const cardName = getCardInfo(cid).name || cid;
                            showConfirm(
                                `Remove "${cardName}" from traded cards?`,
                            ).then((confirmed) => {
                                if (!confirmed) return;
                                toggleTraded(acc, cid);
                                tile.classList.toggle(
                                    "traded",
                                    isTraded(acc, cid),
                                );
                                applyHideTradedClass();
                                if (state.view === "traded") {
                                    tile.style.transition = "opacity 200ms";
                                    tile.style.opacity = "0";
                                    setTimeout(() => renderTradedView(), 220);
                                }
                            });
                            return;
                        }
                        toggleTraded(acc, cid);
                        tile.classList.toggle("traded", isTraded(acc, cid));
                        applyHideTradedClass();
                    });
                }
                return grid;
            }

            function updateShowMore(total, shown) {
                if (shown < total) {
                    el.showMoreBtn.textContent = `Show ${formatNumber(Math.min(PAGE_SIZE, total - shown))} more`;
                    el.showMoreBtn.classList.remove("hidden");
                } else el.showMoreBtn.classList.add("hidden");
            }

            function setLibraryModeLayout(isLibrary) {
                el.toolbarSection.classList.toggle("hidden", isLibrary);
                el.statsSection.classList.toggle("hidden", isLibrary);
                el.filtersSection.classList.toggle("hidden", isLibrary);
                el.viewBarSection.classList.toggle("hidden", isLibrary);
            }

            function setView(view) {
                state.view = view;
                state.displayLimit = INITIAL_LIMIT;
                el.rowViewTab.classList.toggle("active", view === "rows");
                el.accountViewTab.classList.toggle(
                    "active",
                    view === "accounts",
                );
                el.tradedViewTab.classList.toggle("active", view === "traded");
                const inLibrary = view === "allcards";
                el.sectionDbBtn.classList.toggle("active", !inLibrary);
                el.sectionLibraryBtn.classList.toggle("active", inLibrary);
                setLibraryModeLayout(inLibrary);
                el.accountViewActions.classList.toggle(
                    "hidden",
                    view === "traded" || view === "allcards",
                );
                renderCurrent();
            }

            function selectAllPacks() {
                state.selectedPacks = new Set(state.allPacks.keys());
                buildFilterCheckboxes();
                applyFiltersAndRender();
            }
            function clearPacks() {
                state.selectedPacks = new Set();
                buildFilterCheckboxes();
                applyFiltersAndRender();
            }
            function selectAllRarities() {
                state.selectedRarities = new Set(state.allRarities);
                buildFilterCheckboxes();
                applyFiltersAndRender();
            }
            function clearRarities() {
                state.selectedRarities = new Set();
                buildFilterCheckboxes();
                applyFiltersAndRender();
            }
            function selectAllCardTypes() {
                state.selectedCardTypes = new Set(ALL_CARD_TYPES);
                buildFilterCheckboxes();
                applyFiltersAndRender();
            }
            function clearCardTypes() {
                state.selectedCardTypes = new Set();
                buildFilterCheckboxes();
                applyFiltersAndRender();
            }
            const debouncedFilter = debounce(applyFiltersAndRender, 180);
            el.csvFile.addEventListener("change", (event) =>
                handleCsvUpload(event.target.files[0]),
            );
            el.tradesCsvFile.addEventListener("change", (event) =>
                handleTradesCsvUpload(event.target.files[0]),
            );
            el.loadRemoteBtn.addEventListener("click", () =>
                loadResources(true),
            );
            el.clearCacheBtn.addEventListener("click", () => {
                localStorage.removeItem(LS_MASTER);
                localStorage.removeItem(LS_LOCALISATION);
                localStorage.removeItem(LS_CARDMAP);
                localStorage.removeItem(LS_MISSING_RETRY_AT);
                state.cardmaster = null;
                state.localisation = null;
                state.cardmap = null;
                state.cardInfoCache.clear();
                state.cardExpansionCache.clear();
                state.packLabelCache.clear();
                setStatus("Cleared cached card data.");
            });
            el.accountSearch.addEventListener("input", debouncedFilter);
            el.cardSearch.addEventListener("input", debouncedFilter);
            el.rowSort.addEventListener("change", () => {
                state.rowSort = el.rowSort.value;
                applyFiltersAndRender();
            });
            el.accountSort.addEventListener("change", () => {
                state.accountSort = el.accountSort.value;
                state.accountRows = null;
                renderCurrent();
            });
            el.accountSortDir.addEventListener("click", () => {
                state.accountSortAsc = !state.accountSortAsc;
                el.accountSortDir.textContent = state.accountSortAsc
                    ? "↑"
                    : "↓";
                state.accountRows = null;
                renderCurrent();
            });

            el.rowViewTab.addEventListener("click", () => setView("rows"));
            el.accountViewTab.addEventListener("click", () =>
                setView("accounts"),
            );
            el.tradedViewTab.addEventListener("click", () => setView("traded"));
            el.sectionDbBtn.addEventListener("click", () => setView("rows"));
            el.sectionLibraryBtn.addEventListener("click", () =>
                setView("allcards"),
            );
            el.cardSize.addEventListener("change", () =>
                document.documentElement.style.setProperty(
                    "--card-w",
                    `${el.cardSize.value}px`,
                ),
            );
            el.packFilters.addEventListener("change", () => {
                readSelectedFilters();
                buildFilterCheckboxes();
                applyFiltersAndRender();
            });
            el.rarityFilters.addEventListener("change", () => {
                readSelectedFilters();
                buildFilterCheckboxes();
                applyFiltersAndRender();
            });
            el.cardTypeFilters.addEventListener("change", () => {
                readSelectedFilters();
                buildFilterCheckboxes();
                applyFiltersAndRender();
            });
            document
                .querySelectorAll("[data-pack-action]")
                .forEach((button) =>
                    button.addEventListener("click", () =>
                        button.dataset.packAction === "all"
                            ? selectAllPacks()
                            : clearPacks(),
                    ),
                );
            document
                .querySelectorAll("[data-rarity-action]")
                .forEach((button) =>
                    button.addEventListener("click", () =>
                        button.dataset.rarityAction === "all"
                            ? selectAllRarities()
                            : clearRarities(),
                    ),
                );
            document
                .querySelectorAll("[data-card-type-action]")
                .forEach((button) =>
                    button.addEventListener("click", () =>
                        button.dataset.cardTypeAction === "all"
                            ? selectAllCardTypes()
                            : clearCardTypes(),
                    ),
                );
            el.themeToggleBtn.addEventListener("click", () =>
                applyTheme(state.theme === "light" ? "dark" : "light"),
            );
            el.showMoreBtn.addEventListener("click", () => {
                state.displayLimit += PAGE_SIZE;
                renderCurrent();
            });

            el.expandAllBtn.addEventListener("click", () => {
                state.defaultExpanded = true;
                if (state.view === "rows") {
                    const limit = Math.min(
                        state.displayLimit,
                        state.filteredRows.length,
                    );
                    for (let i = 0; i < limit; i++)
                        setRowExpanded(state.filteredRows[i].index, true);
                } else if (state.view === "accounts") {
                    const accounts = buildAccountOverview();
                    const limit = Math.min(state.displayLimit, accounts.length);
                    for (let i = 0; i < limit; i++)
                        setAccountExpanded(accounts[i].key, true);
                }
                renderCurrent();
            });

            el.compactAllBtn.addEventListener("click", () => {
                state.defaultExpanded = false;
                state.expandedRows.clear();
                state.expandedAccounts.clear();
                renderCurrent();
            });

            state.cardmaster = readCachedJson(LS_MASTER);
            state.localisation = readCachedJson(LS_LOCALISATION);
            const rawCardmapCache = readCachedJson(LS_CARDMAP);
            if (rawCardmapCache) {
                state.cardmap =
                    rawCardmapCache instanceof Map
                        ? rawCardmapCache
                        : buildCardMapIndex(rawCardmapCache);
                state.cardCollectionNumberMap =
                    buildCardCollectionNumberIndex(rawCardmapCache);
            }
            loadTradedState();
            if (state.cardmaster && state.localisation && state.cardmap)
                setStatus("Cached card data found. Upload your CSV to start.");

            notifyDashboardActive();
            window.addEventListener("pageshow", notifyDashboardActive);
            window.addEventListener("beforeunload", requestDashboardShutdown);
            setInterval(notifyDashboardActive, 2000);

            initTheme();
            autoLoadDefaultFiles();
        </script>
    </body>
</html>
